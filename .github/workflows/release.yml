# Release workflow for qb-engineer-test (test-bed SPA)
#
# Triggers:
#   - push to main             -> auto-bumped semver: :X.Y.Z + :X.Y + :latest + :main-<sha>
#   - push of a v*.*.* tag     -> :X.Y.Z + :X.Y + :X (manual milestone, fully overrides VERSION)
#
# Versioning model (alpha): the repo's VERSION file at the root holds
# MAJOR.MINOR.BASE manually (e.g. "0.0.0", "0.1.0", "1.0.0"). On every
# main push, CI computes:
#
#   patch    = BASE + (commits since VERSION was last touched)
#   version  = MAJOR.MINOR.patch
#
# So patch increments automatically on every main build; minor and major
# bumps are an explicit `VERSION` edit + commit (next CI build picks them
# up because the distance count resets to 0). No git tag pushing happens
# from inside the workflow, so no recursive build loop. Mirrors the
# qb-engineer-server / qb-engineer-ui release.yml shape.
#
# Image goes to GHCR (ghcr.io/danielhokanson/qb-engineer-test) as a
# multi-arch manifest covering linux/arm64 (Raspberry Pi production target)
# and linux/amd64 (developer workstations, x86_64 testers). The runner is a
# native arm64 machine; amd64 is built via QEMU emulation. Cold-cache build
# time: ~25-40 min (vs ~12-15 min for arm64 alone).
#
# Tests gate the image push: lint-equivalent (build:content), Angular
# production build, and Vitest must all succeed before build-and-push
# starts. The build:content step runs as part of the prebuild hook in
# the package.json — it doubles as a YAML-content validity gate so a
# malformed scenario file blocks the workflow before the Docker build.
#
# Build context is the REPO ROOT (one level above test-bed/) because the
# build-content compile step in the Dockerfile reads from ../docs. The
# VERSION file lives at the repo root for the same reason.

name: Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: test-bed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: test-bed/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Compile scenario content — `prebuild` would run this, but
      # invoking it explicitly here doubles as a content-validity gate
      # that fails the workflow on malformed YAML/Markdown before any
      # Angular work starts.
      - name: Compile scenario content
        run: npm run build:content

      - name: Build (production)
        run: npx ng build --configuration=production

      - name: Unit tests (Vitest)
        run: npx ng test

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so the version-compute step can count
          # commits since VERSION was last touched.
          fetch-depth: 0

      - name: Compute version (auto-bump patch on main)
        id: version
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          base=$(tr -d '[:space:]' < VERSION 2>/dev/null || echo "0.0.0")
          IFS='.' read -r major minor base_patch <<< "$base"
          anchor=$(git log -1 --format=%H -- VERSION 2>/dev/null || echo "")
          if [[ -z "$anchor" ]]; then
            distance=0
          else
            distance=$(git rev-list --count "${anchor}..HEAD")
          fi
          patch=$((base_patch + distance))
          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minor=${major}.${minor}" >> "$GITHUB_OUTPUT"
          echo "Computed image version: ${version} (base=${base}, distance=${distance})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Main-push path: auto-bumped semver from VERSION file.
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag-push path: explicit milestone tag (manual git tag vX.Y.Z).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./test-bed/Dockerfile
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
